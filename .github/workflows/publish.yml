name: Publish to npm
# OIDC Trusted Publishing — NO long-lived token.
#
# One-time setup on npmjs.com before the first tag-triggered publish will work:
#   1. The `contract-ops-agent` package must exist on npm. It doesn't yet, and npm
#      Trusted Publishing is configured per-package, so bootstrap it once:
#        - either do a single manual `npm publish` (npm login → npm publish
#          --access public) to create the package, THEN configure the trusted
#          publisher, or
#        - configure the trusted publisher on your npm account first if your
#          npm plan supports pre-registering it for a new package name.
#   2. Package `contract-ops-agent` → Settings → Trusted Publisher → GitHub Actions
#        organization/user = DrBaher · repository = contract-ops-agent
#        workflow filename = publish.yml · environment = (leave blank)
#
# IMPORTANT: do NOT add `registry-url:` to actions/setup-node. With it, setup-node
# writes a placeholder NODE_AUTH_TOKEN into .npmrc and npm sends *that* instead of
# fetching an OIDC token. Without it, npm >= 11.5.1 performs Trusted Publishing
# via the id-token permission below.
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: ensure npm >= 11.5.1 (OIDC support)
        run: npm install -g npm@latest && npm --version
      - run: npm install --no-audit --no-fund
      - run: npm test
      - name: verify tag matches package.json version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg"; exit 1
          fi
      - run: npm publish --provenance --access public
        # No NODE_AUTH_TOKEN — npm mints a short-lived OIDC token via id-token:write.
