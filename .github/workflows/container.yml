name: Container image

# Builds the zero-setup image on every release tag and pushes it to GHCR as
# ghcr.io/drbaher/contract-ops-agent:<version> and :latest. The image installs
# contract-ops-agent from npm, so this runs AFTER publish.yml has put the
# version on the registry (both trigger on the same tag; npm publish takes
# ~30s, the image build far longer, but retry on a cold miss is just re-running
# this workflow).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Derive version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for npm to serve this version
        run: |
          for i in $(seq 1 30); do
            if [ "$(npm view contract-ops-agent@${{ steps.v.outputs.version }} version 2>/dev/null)" = "${{ steps.v.outputs.version }}" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "npm never served ${{ steps.v.outputs.version }}" >&2
          exit 1

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            AGENT_VERSION=${{ steps.v.outputs.version }}
          tags: |
            ghcr.io/drbaher/contract-ops-agent:${{ steps.v.outputs.version }}
            ghcr.io/drbaher/contract-ops-agent:latest
