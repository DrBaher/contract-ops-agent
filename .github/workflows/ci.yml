name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - run: npm test   # offline suite (unit + onboarding); live tests need the CLIs + an API key
